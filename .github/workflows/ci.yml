name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/model_service/requirements-dev.txt

      - name: Lint
        run: |
          ruff check services/model_service tests

      - name: Unit tests
        run: |
          pytest tests/unit -v

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build model_service image
        run: |
          docker build -t model-service-ci ./services/model_service

  smoke-test:
    runs-on: ubuntu-latest
    needs: [lint-and-unit-test, docker-build]
    env:
      MODEL_SERVICE_URL: http://localhost:8001

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/model_service/requirements-dev.txt

      - name: Build model_service image
        run: |
          docker build -t model-service-ci ./services/model_service

      - name: Start model_service container
        run: |
          docker run -d --name model-service-smoke -p 8001:8001 model-service-ci

      - name: Wait for service readiness
        run: |
          python - <<'PY'
          import time
          import requests

          url = "http://localhost:8001/health"
          for i in range(30):
              try:
                  r = requests.get(url, timeout=3)
                  if r.status_code == 200:
                      print("Service is ready")
                      break
              except Exception:
                  pass
              time.sleep(2)
          else:
              raise SystemExit("Service did not become ready in time")
          PY

      - name: Run smoke tests
        run: |
          pytest tests/smoke -v

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs model-service-smoke

      - name: Stop container
        if: always()
        run: |
          docker rm -f model-service-smoke
