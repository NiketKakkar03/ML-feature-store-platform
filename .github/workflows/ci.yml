name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/model_service/requirements-dev.txt

      - name: Lint
        run: |
          ruff check services/model_service tests

      - name: Unit tests
        run: |
          pytest tests/unit -v

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build model_service image
        run: |
          docker build -t model-service-ci ./services/model_service